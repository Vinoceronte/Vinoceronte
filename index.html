<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ordine Reale - Vinocerordine</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #f8f0ff 0%, #fff5f5 100%); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 16px; }
    .header { width: 100%; max-width: 500px; border-radius: 20px; overflow: hidden; margin-bottom: 20px; box-shadow: 0 8px 30px rgba(74,0,128,0.2); }
    .header-top { background: #fdf6f0; padding: 22px 20px; text-align: center; font-size: 30px; font-weight: 900; color: #111; }
    .header-top span { color: #c0392b; }
    .header-bar { background: #4a0080; color: white; text-align: center; padding: 11px; font-size: 13px; letter-spacing: 1.5px; font-weight: 700; }
    .card { background: white; border-radius: 20px; padding: 24px; width: 100%; max-width: 500px; box-shadow: 0 4px 24px rgba(74,0,128,0.08); margin-bottom: 16px; border: 1px solid #f0e6ff; }
    .domanda { font-size: 22px; font-weight: 700; color: #4a0080; margin-bottom: 16px; text-align: center; }
    .hint { text-align: center; color: #aaa; font-size: 13px; margin-bottom: 12px; }
    .testo-input { width: 100%; padding: 14px; border: 2px solid #d9b3ff; border-radius: 12px; font-size: 16px; margin-bottom: 12px; outline: none; transition: border 0.2s; }
    .testo-input:focus { border-color: #4a0080; }
    /* Rimuove frecce dai campi numerici */
    .numero-input { width: 100%; padding: 14px; border: 2px solid #d9b3ff; border-radius: 12px; font-size: 20px; text-align: center; margin-bottom: 12px; outline: none; transition: border 0.2s; -moz-appearance: textfield; }
    .numero-input:focus { border-color: #4a0080; }
    .numero-input::-webkit-outer-spin-button,
    .numero-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    /* Campo prezzo con simbolo € */
    .prezzo-wrapper { position: relative; margin-bottom: 12px; }
    .prezzo-wrapper .euro { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); font-size: 20px; font-weight: 700; color: #4a0080; pointer-events: none; }
    .prezzo-wrapper .numero-input { padding-left: 36px; margin-bottom: 0; }
    .feedback { border-radius: 12px; padding: 14px; margin-bottom: 16px; font-size: 14px; display: none; line-height: 1.5; }
    .feedback.ok { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
    .feedback.no { background: #ffebee; color: #c62828; border: 1px solid #ef9a9a; }
    .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; margin-bottom: 10px; transition: all 0.2s; }
    .btn:active { transform: scale(0.98); }
    .btn-primary { background: linear-gradient(135deg, #6a0dad, #4a0080); color: white; box-shadow: 0 4px 12px rgba(74,0,128,0.3); }
    .btn-secondary { background: #f0e6ff; color: #4a0080; }
    .btn-success { background: linear-gradient(135deg, #43a047, #2e7d32); color: white; }
    .btn-danger { background: linear-gradient(135deg, #e53935, #c0392b); color: white; }
    .sessione-input { width: 100%; padding: 14px; border: 2px solid #d9b3ff; border-radius: 12px; font-size: 16px; margin-bottom: 16px; outline: none; }
    .lista-vini { margin-bottom: 12px; }
    .vino-option { background: #f8f0ff; border: 2px solid #e8d5ff; border-radius: 12px; padding: 12px 16px; margin-bottom: 8px; cursor: pointer; transition: all 0.2s; font-size: 13px; line-height: 1.4; }
    .vino-option:hover, .vino-option:active { background: #4a0080; color: white; border-color: #4a0080; }
    .vino-option .produttore { font-weight: 700; font-size: 12px; opacity: 0.7; margin-bottom: 2px; }
    .vino-option .nome { font-weight: 600; font-size: 13px; }
    .vino-trovato { background: #e8f5e9; border: 2px solid #a5d6a7; border-radius: 12px; padding: 14px 16px; margin-bottom: 16px; display: none; }
    .vino-trovato .label { font-size: 12px; color: #2e7d32; font-weight: 700; margin-bottom: 6px; }
    .vino-trovato .produttore { font-weight: 700; color: #2e7d32; font-size: 14px; }
    .vino-trovato .nome { color: #333; font-size: 13px; margin-top: 4px; line-height: 1.4; }
    .lista-ordini { width: 100%; max-width: 500px; }
    .ordine-item { background: white; border-radius: 14px; padding: 14px 18px; margin-bottom: 10px; box-shadow: 0 2px 10px rgba(74,0,128,0.08); border-left: 4px solid #6a0dad; }
    .ordine-produttore { color: #4a0080; font-weight: 700; font-size: 15px; }
    .ordine-dettagli { color: #555; font-size: 12px; margin-top: 4px; line-height: 1.4; }
    .ordine-totale { color: #2e7d32; font-weight: 700; font-size: 15px; margin-top: 6px; }
    .sezione-title { color: #4a0080; font-weight: 700; font-size: 15px; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 2px solid #f0e6ff; }
    .totale-sessione { text-align: right; font-weight: 700; color: #4a0080; padding-top: 10px; font-size: 16px; border-top: 2px solid #f0e6ff; margin-top: 8px; }
    .status-msg { text-align: center; padding: 12px; border-radius: 10px; font-weight: 700; display: none; margin-bottom: 12px; }
    .status-msg.ok { background: #e8f5e9; color: #2e7d32; }
    .status-msg.no { background: #ffebee; color: #c62828; }
    .loader { text-align: center; color: #4a0080; font-size: 14px; padding: 10px; display: none; }
    .divider { height: 1px; background: #f0e6ff; margin: 4px 0 14px; }
    .vino-selezionato-info { background: #f0e6ff; border-radius: 10px; padding: 12px 14px; margin-bottom: 14px; font-size: 13px; color: #333; line-height: 1.5; }
    .vino-selezionato-info .produttore-label { font-weight: 700; color: #4a0080; font-size: 14px; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-top">🦏 vino.cer<span>ordine</span></div>
  <div class="header-bar">📦 REGISTRAZIONE ORDINE REALE</div>
</div>

<!-- STEP 0: Nome sessione -->
<div class="card" id="card-sessione">
  <div class="domanda">📝 Nome sessione</div>
  <p class="hint">Es. "Kabaj 15 apr" oppure "Giro Slovenia aprile"</p>
  <input type="text" class="sessione-input" id="nomeSessione" placeholder="Nome della visita in cantina...">
  <button class="btn btn-primary" onclick="iniziaSessione()">Inizia</button>
</div>

<!-- STEP 1: Cerca vino -->
<div class="card" id="card-vino" style="display:none;">
  <div class="domanda">🍷 Qual è il vino?</div>
  <p class="hint">Scrivi il nome e premi Cerca</p>
  <input type="text" class="testo-input" id="input-vino" placeholder="Es. Ravan, Sivi Pinot, Trebez...">
  <button class="btn btn-primary" id="btn-cerca" onclick="cercaVino()">🔍 Cerca</button>
  <div class="loader" id="loader-vino">🔍 Sto cercando...</div>
  <div class="feedback no" id="feedback-vino-no"></div>

  <!-- Risultato singolo -->
  <div class="vino-trovato" id="vino-trovato-singolo">
    <div class="label">✅ Trovato — è questo?</div>
    <div class="produttore" id="vino-singolo-produttore"></div>
    <div class="nome" id="vino-singolo-nome"></div>
  </div>
  <button class="btn btn-success" id="btn-conferma-singolo" onclick="confermaSingolo()" style="display:none;">✅ Sì, è questo!</button>
  <button class="btn btn-secondary" id="btn-riprova-singolo" onclick="riprovaCerca()" style="display:none;">🔄 Cerca di nuovo</button>

  <!-- Lista risultati multipli -->
  <div class="lista-vini" id="lista-vini"></div>
  <div class="status-msg" id="status-vino"></div>
</div>

<!-- STEP 2: Bottiglie -->
<div class="card" id="card-bottiglie" style="display:none;">
  <div class="domanda">📦 Quante bottiglie?</div>
  <div class="vino-selezionato-info" id="info-bt"></div>
  <input type="number" class="numero-input" id="input-bottiglie" placeholder="Es. 3" min="1">
  <button class="btn btn-primary" onclick="confermaBottiglie()">✅ Conferma</button>
  <div class="feedback no" id="feedback-bottiglie-no"></div>
</div>

<!-- STEP 3: Prezzo -->
<div class="card" id="card-prezzo" style="display:none;">
  <div class="domanda">💶 Prezzo per bottiglia?</div>
  <div class="vino-selezionato-info" id="info-pr"></div>
  <div class="prezzo-wrapper">
    <span class="euro">€</span>
    <input type="number" class="numero-input" id="input-prezzo" placeholder="Es. 18" min="0" step="0.5">
  </div>
  <button class="btn btn-primary" onclick="confermaPrezzo()">✅ Conferma</button>
  <div class="feedback no" id="feedback-prezzo-no"></div>
</div>

<!-- Lista ordini -->
<div class="lista-ordini" id="lista-ordini"></div>

<!-- STEP finale -->
<div class="card" id="card-fine" style="display:none;">
  <div class="sezione-title">Cosa vuoi fare?</div>
  <button class="btn btn-success" onclick="salvaEFinisci()">💾 Salva tutto in Sheets</button>
  <div class="divider"></div>
  <button class="btn btn-secondary" onclick="aggiungiAltro()">➕ Aggiungi altro vino</button>
  <button class="btn btn-danger" onclick="annullaEsci()">❌ Annulla tutto</button>
  <div class="status-msg" id="status-fine"></div>
</div>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzw4P2lLuFELMB3EToaN5gvCQSd-2jlfn5Gg7ud2hf022AqrH4ZcksV4NvO46uRVOW-/exec";

  let ordini = [], sessione = '', vinoCorrente = null;
  let cbCounter = 0;

  function jsonpCall(url, callback) {
    const cbName = 'cb_' + (++cbCounter);
    window[cbName] = function(data) {
      delete window[cbName];
      const s = document.getElementById('s_' + cbName);
      if (s) s.remove();
      callback(data);
    };
    const script = document.createElement('script');
    script.id = 's_' + cbName;
    script.src = url + '&callback=' + cbName;
    script.onerror = function() { delete window[cbName]; script.remove(); callback(null); };
    document.head.appendChild(script);
  }

  function mostraStatus(id, msg, tipo) {
    const s = document.getElementById(id);
    s.textContent = msg; s.className = 'status-msg ' + tipo; s.style.display = 'block';
    setTimeout(() => s.style.display = 'none', 3000);
  }

  // ---- SESSIONE ----
  function iniziaSessione() {
    sessione = document.getElementById('nomeSessione').value.trim();
    if (!sessione) { alert('Inserisci un nome per la sessione!'); return; }
    document.getElementById('card-sessione').style.display = 'none';
    document.getElementById('card-vino').style.display = 'block';
    document.getElementById('input-vino').focus();
  }

  // ---- CERCA VINO ----
  function cercaVino() {
    const testo = document.getElementById('input-vino').value.trim();
    if (!testo) { alert('Scrivi il nome del vino!'); return; }

    document.getElementById('loader-vino').style.display = 'block';
    document.getElementById('btn-cerca').style.display = 'none';
    document.getElementById('lista-vini').innerHTML = '';
    document.getElementById('feedback-vino-no').style.display = 'none';
    document.getElementById('vino-trovato-singolo').style.display = 'none';
    document.getElementById('btn-conferma-singolo').style.display = 'none';
    document.getElementById('btn-riprova-singolo').style.display = 'none';

    jsonpCall(SCRIPT_URL + '?action=cercaVino&query=' + encodeURIComponent(testo), function(r) {
      document.getElementById('loader-vino').style.display = 'none';
      document.getElementById('btn-cerca').style.display = 'block';

      if (!r) {
        document.getElementById('feedback-vino-no').textContent = '❌ Errore di connessione — riprova';
        document.getElementById('feedback-vino-no').style.display = 'block';
        return;
      }

      if (!r.trovato) {
        document.getElementById('feedback-vino-no').textContent = '❌ Nessun vino trovato — prova con un nome diverso';
        document.getElementById('feedback-vino-no').style.display = 'block';
        return;
      }

      if (r.singolo) {
        vinoCorrente = { nomeCompleto: r.nomeCompleto, produttore: r.produttore };
        document.getElementById('vino-singolo-produttore').textContent = r.produttore;
        document.getElementById('vino-singolo-nome').textContent = r.nomeCompleto;
        document.getElementById('vino-trovato-singolo').style.display = 'block';
        document.getElementById('btn-conferma-singolo').style.display = 'block';
        document.getElementById('btn-riprova-singolo').style.display = 'block';
        document.getElementById('btn-cerca').style.display = 'none';
      } else {
        mostraListaVini(r.risultati);
      }
    });
  }

  function confermaSingolo() { vai_a_bottiglie(); }

  function riprovaCerca() {
    document.getElementById('vino-trovato-singolo').style.display = 'none';
    document.getElementById('btn-conferma-singolo').style.display = 'none';
    document.getElementById('btn-riprova-singolo').style.display = 'none';
    document.getElementById('btn-cerca').style.display = 'block';
    document.getElementById('input-vino').value = '';
    document.getElementById('input-vino').focus();
  }

  function mostraListaVini(risultati) {
    let html = '<p style="color:#4a0080;font-weight:700;font-size:14px;margin-bottom:10px;">Seleziona il vino:</p>';
    risultati.forEach(function(v) {
      html += '<div class="vino-option" onclick=\'selezionaVino("' + v.nomeCompleto.replace(/\\/g, '\\\\').replace(/"/g, '\\"').replace(/'/g, "\\'") + '","' + v.produttore.replace(/\\/g, '\\\\').replace(/"/g, '\\"').replace(/'/g, "\\'") + '")\'>';
      html += '<div class="produttore">' + v.produttore + '</div>';
      html += '<div class="nome">' + v.nomeCompleto + '</div>';
      html += '</div>';
    });
    document.getElementById('lista-vini').innerHTML = html;
  }

  function selezionaVino(nomeCompleto, produttore) {
    vinoCorrente = { nomeCompleto: nomeCompleto, produttore: produttore };
    vai_a_bottiglie();
  }

  function vai_a_bottiglie() {
    document.getElementById('card-vino').style.display = 'none';
    document.getElementById('card-bottiglie').style.display = 'block';
    document.getElementById('info-bt').innerHTML = '<div class="produttore-label">' + vinoCorrente.produttore + '</div>' + vinoCorrente.nomeCompleto;
    document.getElementById('input-bottiglie').value = '';
    document.getElementById('feedback-bottiglie-no').style.display = 'none';
    document.getElementById('input-bottiglie').focus();
  }

  // ---- BOTTIGLIE ----
  function confermaBottiglie() {
    const val = document.getElementById('input-bottiglie').value.trim();
    const n = parseInt(val);
    if (!val || isNaN(n) || n <= 0) {
      document.getElementById('feedback-bottiglie-no').textContent = '❌ Inserisci un numero valido';
      document.getElementById('feedback-bottiglie-no').style.display = 'block';
      return;
    }
    vinoCorrente.bottiglie = n;
    document.getElementById('card-bottiglie').style.display = 'none';
    document.getElementById('card-prezzo').style.display = 'block';
    document.getElementById('info-pr').innerHTML = '<div class="produttore-label">' + vinoCorrente.produttore + '</div>' + vinoCorrente.nomeCompleto + '<br><strong style="color:#4a0080">' + n + ' bottiglie</strong>';
    document.getElementById('input-prezzo').value = '';
    document.getElementById('feedback-prezzo-no').style.display = 'none';
    document.getElementById('input-prezzo').focus();
  }

  // ---- PREZZO ----
  function confermaPrezzo() {
    const val = document.getElementById('input-prezzo').value.trim();
    const n = parseFloat(val.replace(',', '.'));
    if (!val || isNaN(n) || n <= 0) {
      document.getElementById('feedback-prezzo-no').textContent = '❌ Inserisci un prezzo valido';
      document.getElementById('feedback-prezzo-no').style.display = 'block';
      return;
    }
    vinoCorrente.prezzo = n;
    ordini.push({
      sessione: sessione,
      nomeCompleto: vinoCorrente.nomeCompleto,
      produttore: vinoCorrente.produttore,
      bottiglie: vinoCorrente.bottiglie,
      prezzo: vinoCorrente.prezzo
    });
    aggiornaLista();
    document.getElementById('card-prezzo').style.display = 'none';
    document.getElementById('card-fine').style.display = 'block';
  }

  // ---- LISTA ORDINI ----
  function aggiornaLista() {
    const lista = document.getElementById('lista-ordini');
    if (ordini.length === 0) { lista.innerHTML = ''; return; }
    let tot = ordini.reduce((s,o) => s + o.bottiglie * o.prezzo, 0);
    let html = '<div class="card"><div class="sezione-title">🧾 Ordini questa sessione</div>';
    ordini.forEach(o => {
      html += '<div class="ordine-item">';
      html += '<div class="ordine-produttore">' + o.produttore + '</div>';
      html += '<div class="ordine-dettagli">' + o.nomeCompleto + '<br>' + o.bottiglie + ' bott. × €' + o.prezzo + '</div>';
      html += '<div class="ordine-totale">€' + (o.bottiglie * o.prezzo).toFixed(2) + '</div>';
      html += '</div>';
    });
    html += '<div class="totale-sessione">Totale sessione: €' + tot.toFixed(2) + '</div>';
    html += '</div>';
    lista.innerHTML = html;
  }

  // ---- NAVIGAZIONE ----
  function aggiungiAltro() {
    vinoCorrente = null;
    document.getElementById('card-fine').style.display = 'none';
    document.getElementById('card-vino').style.display = 'block';
    document.getElementById('input-vino').value = '';
    document.getElementById('lista-vini').innerHTML = '';
    document.getElementById('feedback-vino-no').style.display = 'none';
    document.getElementById('vino-trovato-singolo').style.display = 'none';
    document.getElementById('btn-conferma-singolo').style.display = 'none';
    document.getElementById('btn-riprova-singolo').style.display = 'none';
    document.getElementById('btn-cerca').style.display = 'block';
    document.getElementById('input-vino').focus();
  }

  function salvaEFinisci() {
    mostraStatus('status-fine', '💾 Salvataggio in corso...', 'ok');
    jsonpCall(SCRIPT_URL + '?action=salvaOrdini&data=' + encodeURIComponent(JSON.stringify(ordini)), function(r) {
      if (r) {
        mostraStatus('status-fine', '✅ Salvato in Sheets!', 'ok');
        setTimeout(() => {
          ordini = []; aggiornaLista();
          document.getElementById('card-fine').style.display = 'none';
          document.getElementById('card-sessione').style.display = 'block';
          document.getElementById('nomeSessione').value = '';
        }, 2000);
      } else {
        mostraStatus('status-fine', '❌ Errore salvataggio — riprova!', 'no');
      }
    });
  }

  function annullaEsci() {
    if (confirm('Sicuro? Perderai tutto!')) {
      ordini = []; aggiornaLista();
      ['card-fine','card-vino','card-bottiglie','card-prezzo'].forEach(id => {
        document.getElementById(id).style.display = 'none';
      });
      document.getElementById('card-sessione').style.display = 'block';
      document.getElementById('nomeSessione').value = '';
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('input-vino').addEventListener('keypress', e => { if (e.key === 'Enter') cercaVino(); });
    document.getElementById('input-bottiglie').addEventListener('keypress', e => { if (e.key === 'Enter') confermaBottiglie(); });
    document.getElementById('input-prezzo').addEventListener('keypress', e => { if (e.key === 'Enter') confermaPrezzo(); });
    document.getElementById('nomeSessione').addEventListener('keypress', e => { if (e.key === 'Enter') iniziaSessione(); });
  });
</script>
</body>
</html>
